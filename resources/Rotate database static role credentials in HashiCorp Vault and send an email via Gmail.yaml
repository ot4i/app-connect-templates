$integration: http://ibm.com/appconnect/integration/v2/integrationFile
integration:
  type: trigger-action
  trigger-interfaces:
    trigger-interface-1:
      type: event-trigger
      connector-type: streaming-connector-scheduler
      triggers:
        SCHEDULE:
          assembly:
            $ref: '#/integration/assemblies/assembly-1'
          input-context:
            data: scheduler
          options:
            subscription:
              scheduleConfiguration:
                interval:
                  unit: minute
                  value: 1
                  runOnceOncheck: true
                  days:
                    - MON
                    - TUE
                    - WED
                    - THU
                    - FRI
                    - SAT
                    - SUN
                  timeZone: UTC
            connectorServiceOptions:
              httpMethod: post
              path: resources/scheduler/operations/SCHEDULE/subscribe
              action: schedule
      account-name: Account 2
  action-interfaces:
    action-interface-2:
      type: api-action
      business-object: Rotate-role
      connector-type: hashicorpvault
      account-name: Account 3
      actions:
        database_rotate_static_role_credentials: {}
      options:
        connectorServiceOptions:
          httpMethod: post
          path: >-
            resources/Rotate-role/operations/database_rotate_static_role_credentials
          action: custom
    action-interface-1:
      type: api-action
      business-object: Static-creds
      connector-type: hashicorpvault
      account-name: Account 3
      actions:
        database_read_static_role_credentials: {}
      options:
        connectorServiceOptions:
          httpMethod: get
          path: >-
            resources/Static-creds/operations/database_read_static_role_credentials
          action: retrieve
    action-interface-3:
      type: api-action
      business-object: mail
      connector-type: gmail
      account-name: Account 1
      actions:
        CREATE: {}
      options:
        connectorServiceOptions:
          httpMethod: post
          path: resources/mail
          action: create
  assemblies:
    assembly-1:
      assembly:
        execute:
          - custom-action:
              name: HashiCorp Vault (IBM Vault) Rotate static credentials
              target:
                $ref: '#/integration/action-interfaces/action-interface-2'
              action: database_rotate_static_role_credentials
              map:
                $map: http://ibm.com/appconnect/map/v1
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: flowDetails
                    $ref: '#/flowDetails'
                mappings: []
              filter:
                where:
                  name: static
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: flowDetails
                    $ref: '#/flowDetails'
          - custom-action:
              name: HashiCorp Vault (IBM Vault) Retrieve static role credentials
              target:
                $ref: '#/integration/action-interfaces/action-interface-1'
              action: database_read_static_role_credentials
              map:
                $map: http://ibm.com/appconnect/map/v1
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: HashiCorpVaultIBMVaultRotatestaticcredentials
                    $ref: >-
                      #/node-output/HashiCorp Vault (IBM Vault) Rotate static
                      credentials/response/payload
                  - variable: flowDetails
                    $ref: '#/flowDetails'
                mappings: []
              filter:
                where:
                  name: static
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: HashiCorpVaultIBMVaultRotatestaticcredentials
                    $ref: >-
                      #/node-output/HashiCorp Vault (IBM Vault) Rotate static
                      credentials/response/payload
                  - variable: flowDetails
                    $ref: '#/flowDetails'
          - create-action:
              name: Gmail Send email
              target:
                $ref: '#/integration/action-interfaces/action-interface-3'
              map:
                mappings:
                  - Body:
                      template: >-
                        {{$HashiCorpVaultIBMVaultRetrievestaticrolecredentials.data}}
                  - Subject:
                      template: new database creds
                  - To:
                      template: ravula.deeraj.reddy@ibm.com
                $map: http://ibm.com/appconnect/map/v1
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: HashiCorpVaultIBMVaultRotatestaticcredentials
                    $ref: >-
                      #/node-output/HashiCorp Vault (IBM Vault) Rotate static
                      credentials/response/payload
                  - variable: HashiCorpVaultIBMVaultRetrievestaticrolecredentials
                    $ref: >-
                      #/node-output/HashiCorp Vault (IBM Vault) Retrieve static
                      role credentials/response/payload
                  - variable: flowDetails
                    $ref: '#/flowDetails'
  name: database flow
models: {}
