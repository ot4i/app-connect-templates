$integration: http://ibm.com/appconnect/integration/v2/integrationFile
integration:
  type: trigger-action
  trigger-interfaces:
    trigger-interface-1:
      type: event-trigger
      connector-type: streaming-connector-scheduler
      triggers:
        SCHEDULE:
          assembly:
            $ref: '#/integration/assemblies/assembly-1'
          input-context:
            data: scheduler
          options:
            subscription:
              scheduleConfiguration:
                interval:
                  unit: minute
                  value: 1
                  runOnceOncheck: true
                  days:
                    - MON
                    - TUE
                    - WED
                    - THU
                    - FRI
                    - SAT
                    - SUN
                  timeZone: UTC
            connectorServiceOptions:
              httpMethod: post
              path: resources/scheduler/operations/SCHEDULE/subscribe
              action: schedule
      account-name: Account 2
  action-interfaces:
    action-interface-1:
      type: api-action
      business-object: Leases
      connector-type: hashicorpvault
      account-name: Account 2
      actions:
        leases_revoke_lease_with_prefix: {}
      options:
        connectorServiceOptions:
          httpMethod: post
          path: resources/Leases/operations/leases_revoke_lease_with_prefix
          action: custom
    action-interface-2:
      type: api-action
      business-object: Creds
      connector-type: hashicorpvault
      account-name: Account 2
      actions:
        azure_request_service_principal_credentials: {}
      options:
        connectorServiceOptions:
          httpMethod: get
          path: >-
            resources/Creds/operations/azure_request_service_principal_credentials
          action: custom
    action-interface-3:
      type: api-action
      business-object: mail
      connector-type: gmail
      account-name: Account 1
      actions:
        CREATE: {}
      options:
        connectorServiceOptions:
          httpMethod: post
          path: resources/mail
          action: create
  assemblies:
    assembly-1:
      assembly:
        execute:
          - custom-action:
              name: HashiCorp Vault (IBM Vault) Revoke leases by prefix
              target:
                $ref: '#/integration/action-interfaces/action-interface-1'
              action: leases_revoke_lease_with_prefix
              map:
                mappings:
                  - sync:
                      expression: 'true'
                $map: http://ibm.com/appconnect/map/v1
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: flowDetails
                    $ref: '#/flowDetails'
              filter:
                where:
                  prefix: azureservice/creds/my-static-role
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: flowDetails
                    $ref: '#/flowDetails'
          - custom-action:
              name: HashiCorp Vault (IBM Vault) Generate Azure credentials
              target:
                $ref: '#/integration/action-interfaces/action-interface-2'
              action: azure_request_service_principal_credentials
              map:
                $map: http://ibm.com/appconnect/map/v1
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: HashiCorpVaultIBMVaultRevokeleasesbyprefix
                    $ref: >-
                      #/node-output/HashiCorp Vault (IBM Vault) Revoke leases by
                      prefix/response/payload
                  - variable: flowDetails
                    $ref: '#/flowDetails'
                mappings: []
              filter:
                where:
                  role: my-static-role
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: HashiCorpVaultIBMVaultRevokeleasesbyprefix
                    $ref: >-
                      #/node-output/HashiCorp Vault (IBM Vault) Revoke leases by
                      prefix/response/payload
                  - variable: flowDetails
                    $ref: '#/flowDetails'
          - create-action:
              name: Gmail Send email
              target:
                $ref: '#/integration/action-interfaces/action-interface-3'
              map:
                mappings:
                  - Body:
                      template: '{{$HashiCorpVaultIBMVaultGenerateAzurecredentials.data}}'
                  - Subject:
                      template: new azure crendentials
                  - To:
                      template: ravula.deeraj.reddy@ibm.com
                $map: http://ibm.com/appconnect/map/v1
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: HashiCorpVaultIBMVaultRevokeleasesbyprefix
                    $ref: >-
                      #/node-output/HashiCorp Vault (IBM Vault) Revoke leases by
                      prefix/response/payload
                  - variable: HashiCorpVaultIBMVaultGenerateAzurecredentials
                    $ref: >-
                      #/node-output/HashiCorp Vault (IBM Vault) Generate Azure
                      credentials/response/payload
                  - variable: flowDetails
                    $ref: '#/flowDetails'
  name: azure flow
models: {}
