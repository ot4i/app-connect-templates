$integration: http://ibm.com/appconnect/integration/v2/integrationFile
integration:
  type: trigger-action
  trigger-interfaces:
    trigger-interface-1:
      type: event-trigger
      connector-type: salesforce
      triggers:
        CREATED:
          assembly:
            $ref: '#/integration/assemblies/assembly-1'
          input-context:
            data: Lead
          options:
            connectorServiceOptions:
              httpMethod: post
              path: resources/Lead/operations/CREATED/subscribe
              action: created
  action-interfaces:
    action-interface-2:
      type: api-action
      business-object: Cadence memberships
      connector-type: salesloft
      actions:
        createCadenceMembership: {}
      options:
        connectorServiceOptions:
          httpMethod: post
          path: resources/Cadence%20memberships/operations/createCadenceMembership
          action: create
  assemblies:
    assembly-1:
      assembly:
        execute:
          - custom-action:
              name: Salesloft Create cadence membership
              target:
                $ref: '#/integration/action-interfaces/action-interface-2'
              action: createCadenceMembership
              map:
                mappings:
                  - cadence_id:
                      expression: '123456'
                  - person_id:
                      expression: '987654'
                $map: http://ibm.com/appconnect/map/v1
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: flowDetails
                    $ref: '#/flowDetails'
              filter: {}
  name: Notify salesloft customer when new lead is created in Salesforce
models: {}
