$integration: http://ibm.com/appconnect/integration/v2/integrationFile
integration:
  type: trigger-action
  trigger-interfaces:
    trigger-interface-1:
      type: event-trigger
      connector-type: streaming-connector-scheduler
      triggers:
        SCHEDULE:
          assembly:
            $ref: '#/integration/assemblies/assembly-1'
          input-context:
            data: scheduler
          options:
            subscription:
              scheduleConfiguration:
                interval:
                  unit: minute
                  value: 15
                  runOnceOncheck: false
                  days:
                    - MON
                    - TUE
                    - WED
                    - THU
                    - FRI
                  timeZone: UTC
            connectorServiceOptions:
              httpMethod: post
              path: resources/scheduler/operations/SCHEDULE/subscribe
              action: schedule
  action-interfaces:
    action-interface-1:
      type: api-action
      business-object: Tickets
      connector-type: freshservice
      actions:
        getTickets: {}
      options:
        connectorServiceOptions:
          httpMethod: get
          path: resources/Tickets/operations/getTickets
          action: retrievewithwhere
    action-interface-2:
      type: api-action
      business-object: Requesters
      connector-type: freshservice
      actions:
        getRequester: {}
      options:
        connectorServiceOptions:
          httpMethod: get
          path: resources/Requesters/operations/getRequester
          action: retrieve
    action-interface-3:
      type: api-action
      business-object: People
      connector-type: salesloft
      actions:
        listPeople: {}
      options:
        connectorServiceOptions:
          httpMethod: get
          path: resources/People/operations/listPeople
          action: retrievewithwhere
    action-interface-4:
      type: api-action
      business-object: Cadence memberships
      connector-type: salesloft
      actions:
        createCadenceMembership: {}
      options:
        connectorServiceOptions:
          httpMethod: post
          path: resources/Cadence%20memberships/operations/createCadenceMembership
          action: create
  assemblies:
    assembly-1:
      assembly:
        execute:
          - custom-action:
              name: Freshservice Retrieve tickets
              target:
                $ref: '#/integration/action-interfaces/action-interface-1'
              allow-empty-output: false
              filter:
                limit: 10
                where:
                  updated_at:
                    gt: '{{$Trigger.currentEventTime}}'
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: flowDetails
                    $ref: '#/flowDetails'
              allow-truncation: true
              pagination-type: SKIP_LIMIT
              action: getTickets
              map:
                $map: http://ibm.com/appconnect/map/v1
                mappings: []
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: flowDetails
                    $ref: '#/flowDetails'
          - for-each:
              map:
                $map: http://ibm.com/appconnect/map/v1
                mappings: []
              source:
                expression: '$FreshserviceRetrievetickets '
                input:
                  - variable: Trigger
                    $ref: '#/trigger/payload'
                  - variable: FreshserviceRetrievetickets
                    $ref: '#/node-output/Freshservice Retrieve tickets/response/payload'
                  - variable: flowDetails
                    $ref: '#/flowDetails'
              mode: parallel
              continue-on-error: true
              name: For each
              assembly:
                $ref: '#/integration/assemblies/assembly-2'
              display-name: Freshservice Tickets
    assembly-2:
      assembly:
        execute:
          - if:
              branch:
                - condition:
                    '{{$Foreachitem.status}}': '5'
                  execute:
                    - custom-action:
                        name: Freshservice Retrieve requester by ID
                        target:
                          $ref: '#/integration/action-interfaces/action-interface-2'
                        action: getRequester
                        map:
                          $map: http://ibm.com/appconnect/map/v1
                          input:
                            - variable: Trigger
                              $ref: '#/trigger/payload'
                            - variable: FreshserviceRetrievetickets
                              $ref: '#/node-output/Freshservice Retrieve tickets/response/payload'
                            - variable: Foreachitem
                              $ref: '#/block/For each/current-item'
                            - variable: flowDetails
                              $ref: '#/flowDetails'
                          mappings: []
                        filter:
                          where:
                            id: '{{$Foreachitem.requester_id}}'
                          input:
                            - variable: Trigger
                              $ref: '#/trigger/payload'
                            - variable: FreshserviceRetrievetickets
                              $ref: '#/node-output/Freshservice Retrieve tickets/response/payload'
                            - variable: Foreachitem
                              $ref: '#/block/For each/current-item'
                            - variable: flowDetails
                              $ref: '#/flowDetails'
                    - custom-action:
                        name: Salesloft Retrieve people
                        target:
                          $ref: '#/integration/action-interfaces/action-interface-3'
                        allow-empty-output: false
                        filter:
                          limit: 10
                          where:
                            email_addresses: '{{$FreshserviceRetrieverequesterbyID.primary_email}}'
                          input:
                            - variable: Trigger
                              $ref: '#/trigger/payload'
                            - variable: FreshserviceRetrievetickets
                              $ref: '#/node-output/Freshservice Retrieve tickets/response/payload'
                            - variable: FreshserviceRetrieverequesterbyID
                              $ref: '#/block/If/node-output/Freshservice Retrieve requester by ID/response/payload'
                            - variable: Foreachitem
                              $ref: '#/block/For each/current-item'
                            - variable: flowDetails
                              $ref: '#/flowDetails'
                        allow-truncation: true
                        pagination-type: SKIP_LIMIT
                        action: listPeople
                        map:
                          $map: http://ibm.com/appconnect/map/v1
                          input:
                            - variable: Trigger
                              $ref: '#/trigger/payload'
                            - variable: FreshserviceRetrievetickets
                              $ref: '#/node-output/Freshservice Retrieve tickets/response/payload'
                            - variable: FreshserviceRetrieverequesterbyID
                              $ref: '#/block/If/node-output/Freshservice Retrieve requester by ID/response/payload'
                            - variable: Foreachitem
                              $ref: '#/block/For each/current-item'
                            - variable: flowDetails
                              $ref: '#/flowDetails'
                          mappings: []
                    - custom-action:
                        name: Salesloft Create cadence membership
                        target:
                          $ref: '#/integration/action-interfaces/action-interface-4'
                        action: createCadenceMembership
                        map:
                          mappings:
                            - cadence_id:
                                expression: '123456'
                            - person_id:
                                expression: '$SalesloftRetrievepeople[0].id '
                          $map: http://ibm.com/appconnect/map/v1
                          input:
                            - variable: Trigger
                              $ref: '#/trigger/payload'
                            - variable: FreshserviceRetrievetickets
                              $ref: '#/node-output/Freshservice Retrieve tickets/response/payload'
                            - variable: FreshserviceRetrieverequesterbyID
                              $ref: '#/block/If/node-output/Freshservice Retrieve requester by ID/response/payload'
                            - variable: SalesloftRetrievepeople
                              $ref: '#/block/If/node-output/Salesloft Retrieve people/response/payload'
                            - variable: Foreachitem
                              $ref: '#/block/For each/current-item'
                            - variable: flowDetails
                              $ref: '#/flowDetails'
                        filter: {}
              else:
                execute: []
              name: If
              input:
                - variable: Trigger
                  $ref: '#/trigger/payload'
                - variable: FreshserviceRetrievetickets
                  $ref: '#/node-output/Freshservice Retrieve tickets/response/payload'
                - variable: Foreachitem
                  $ref: '#/block/For each/current-item'
                - variable: flowDetails
                  $ref: '#/flowDetails'
  name: Send a mail requesting feedback when a Freshservice ticket is resolved
models: {}
